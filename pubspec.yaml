name: local_pro_connect
description: Services à portée de main
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Navigation
  go_router: ^14.2.7

  # Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # UI / UX
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Storage
  shared_preferences: ^2.3.2

  # Media
  image_picker: ^1.2.2
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.0
  flutter_app_icon_changer: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png
    - assets/images/1.jpg
    - assets/images/2.jpg
    - assets/animations/45.jpg
    - assets/icons/symbole.png
